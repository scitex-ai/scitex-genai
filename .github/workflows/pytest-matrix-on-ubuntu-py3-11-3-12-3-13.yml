name: tests

# Reusable-workflow caller (scitex-ai/.github, 2026-07-10 fleet migration).
# Triggers preserved verbatim from the prior local file. Job body now
# comes from scitex-ai/.github's pytest-matrix.yml (same matrix/install/
# pytest/codecov steps).
# New required-status-check context: "pytest-matrix / pytest-matrix-on-ubuntu-py<X.YY>"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 17 * * *"  # nightly 17:00 UTC (~02:00 JST), off-peak
  workflow_dispatch:

jobs:
  pytest-matrix:
    uses: scitex-ai/.github/.github/workflows/pytest-matrix.yml@main
    secrets: inherit
