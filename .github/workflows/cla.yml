name: CLA Assistant

# Reusable-workflow caller (scitex-ai/.github, 2026-07-10 fleet migration).
# Triggers/permissions preserved verbatim from the prior local file.
# owner_allowlist is overridden (adds LLEmacs on top of the reusable
# workflow's default "bot*,ywatanabe1989") to match this repo's prior
# hardcoded allowlist. owner_login/default_branch already match defaults.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  call:
    uses: scitex-ai/.github/.github/workflows/cla.yml@main
    with:
      owner_allowlist: "bot*,ywatanabe1989,LLEmacs"
    secrets: inherit
