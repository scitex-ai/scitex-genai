name: import-smoke

# Reusable-workflow caller (scitex-ai/.github, 2026-07-10 fleet migration).
# Triggers preserved verbatim from the prior local file. Job body now
# comes from scitex-ai/.github's import-smoke.yml (same checkout+install+
# import steps, uv-managed instead of setup-python+pip — no behavior lost).
# New required-status-check context: "import-smoke / import-smoke-on-ubuntu-py3-12"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 17 * * *"  # nightly 17:00 UTC (~02:00 JST), off-peak
  workflow_dispatch:

jobs:
  import-smoke:
    uses: scitex-ai/.github/.github/workflows/import-smoke.yml@main
    secrets: inherit
