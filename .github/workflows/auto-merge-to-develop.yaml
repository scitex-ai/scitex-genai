name: auto-merge-to-develop

# Reusable-workflow caller (scitex-ai/.github, 2026-07-10 fleet migration).
# Triggers/permissions preserved verbatim from the prior local file.
# GitHub reads check_suite-triggered workflows from the DEFAULT branch,
# so this file must stay on main, acting only on PRs whose base is develop
# (unchanged from before).

on:
  check_suite:
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  call:
    uses: scitex-ai/.github/.github/workflows/auto-merge-to-develop.yml@main
    secrets: inherit
